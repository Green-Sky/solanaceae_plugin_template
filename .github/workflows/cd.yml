name: ContinuousDelivery

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  BUILD_TYPE: RelWidthDebInfo
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  linux-ubuntu:
    timeout-minutes: 10

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_FLAGS=-gz -DCMAKE_CXX_FLAGS=-gz -DCMAKE_EXE_LINKER_FLAGS=-gz

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 4

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}

    - name: Determine tag name
      id: tag
      shell: bash
      run: . .github/workflows/tag_version.bash

    - name: Compress artifacts
      shell: bash
      run: |
        tar -czvf ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-ubuntu24.04-x86_64.tar.gz -C ${{github.workspace}}/build/bin/ .

    - uses: actions/upload-artifact@v6
      with:
        # TODO: simpler name?
        name: ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-ubuntu24.04-x86_64
        # TODO: do propper packing
        path: |
          ${{github.workspace}}/${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-ubuntu24.04-x86_64.tar.gz

  linux-debian12:
    timeout-minutes: 10

    runs-on: ubuntu-latest
    container:
      image: debian:12

    steps:
    - name: Install Dependencies
      run: apt update && apt -y install git build-essential pkg-config cmake ninja-build

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fix gitconfig
      run: git config --system --add safe.directory ${GITHUB_WORKSPACE}

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_FLAGS=-gz -DCMAKE_CXX_FLAGS=-gz -DCMAKE_EXE_LINKER_FLAGS=-gz

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 4

    - name: Determine tag name
      id: tag
      shell: bash
      run: . .github/workflows/tag_version.bash

    - name: Compress artifacts
      shell: bash
      run: |
        tar -czvf ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-debian12-x86_64.tar.gz -C ${{github.workspace}}/build/bin/ .

    - uses: actions/upload-artifact@v6
      with:
        name: ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-debian12-x86_64
        path: |
          ${{github.workspace}}/${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-debian12-x86_64.tar.gz

  windows:
    timeout-minutes: 15

    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        type: ['', 'asan']
        os: ['windows-2022']

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # setup vs env
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Configure CMake
      run: cmake -G Ninja -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Determine tag name
      id: tag
      shell: bash
      run: . .github/workflows/tag_version.bash

    - name: Clean temporary artifacts
      # msvc sometimes produces .ilk files, which are used for linking only
      shell: powershell
      run: |
        Remove-Item "${{github.workspace}}/build/bin/*.ilk"

    - name: Compress artifacts
      shell: powershell
      run: |
        Compress-Archive -Path ${{github.workspace}}/build/bin/* -Destination ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-msvc${{matrix.type == 'asan' && '-asan' || ''}}-x86_64.zip

    - uses: actions/upload-artifact@v6
      with:
        # TODO: simpler name?
        name: ${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-msvc${{matrix.type == 'asan' && '-asan' || ''}}-x86_64
        # TODO: do propper packing
        path: |
          ${{github.workspace}}/${{ github.event.repository.name }}-${{ steps.tag.outputs.name }}-${{ runner.os }}-msvc${{matrix.type == 'asan' && '-asan' || ''}}-x86_64.zip

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) }}

    runs-on: ubuntu-latest

    needs:
      - linux-ubuntu
      - linux-debian12
      - windows

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Determine tag name
      id: tag
      shell: bash
      run: . .github/workflows/tag_version.bash

    - name: Download artifacts
      id: download-artifact
      uses: actions/download-artifact@v7
      with:
        path: ./artifacts/

    - name: Create release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.tag.outputs.name }}
      shell: bash
      run: |
        gh release create "$tag" \
            --repo="$GITHUB_REPOSITORY" \
            --title="nightly ${tag#v}" \
            --notes="nightly build" \
            --prerelease

    - name: Upload artifacts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.tag.outputs.name }}
      shell: bash
      run: |
        ls -laR ./artifacts
        gh release upload "$tag" ./artifacts/*/* \
            --repo="$GITHUB_REPOSITORY"
